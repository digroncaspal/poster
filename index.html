<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포스터 · 승부 예측</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css">
<style>
  :root{
    --ink:#1A1C22; --muted:#7E828C;
    --kor:#CD2E3A; --mex:#006847;
    --yellow:#FFD84D; --soft:#FFF3D2; --bg:#FBFAF7;
    --bhs:"Black Han Sans","Jua",sans-serif;
    --jua:"Jua","Black Han Sans",sans-serif;
    --body:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body); background:#c9ccd2; display:flex; flex-direction:column;
    align-items:center; padding:22px 10px; -webkit-font-smoothing:antialiased}
  .toolbar{margin-bottom:14px; text-align:center}
  .print-btn{font-family:var(--bhs); font-size:1rem; color:#fff; background:var(--ink);
    border:none; border-radius:.6rem; padding:.7rem 1.4rem; cursor:pointer}
  .print-btn:hover{background:#000}
  .hint{color:#444; font-size:.8rem; margin-top:8px}

  .poster{width:210mm; height:297mm; background:var(--bg); position:relative; overflow:hidden;
    padding:16mm 15mm 13mm; display:flex; flex-direction:column;
    box-shadow:0 18px 50px rgba(0,0,0,.22)}

  .eyebrow{align-self:center; font-family:var(--jua); font-size:4.4mm; color:var(--ink);
    background:var(--yellow); padding:1.8mm 6mm; border-radius:99px}

  .headline{font-family:var(--bhs); text-align:center; font-size:30mm; line-height:1;
    margin-top:5mm; color:var(--ink)}
  .headline em{font-style:normal; position:relative; white-space:nowrap}
  .headline em::after{content:""; position:absolute; left:-1mm; right:-1mm; bottom:1.5mm; height:6mm;
    background:var(--yellow); z-index:-1; border-radius:1mm}
  .tagline{text-align:center; font-size:5mm; color:#454952; margin-top:4mm; font-weight:600}

  /* 매치업 */
  .matchup{display:flex; margin-top:8mm; border-radius:3mm; overflow:hidden; position:relative;
    box-shadow:0 4mm 10mm rgba(0,0,0,.10)}
  .side{flex:1; padding:6mm 4mm; text-align:center; color:#fff; font-family:var(--bhs); font-size:8mm; line-height:1}
  .side.kor{background:var(--kor)} .side.mex{background:var(--mex)}
  .vsmedal{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:13mm; height:13mm; border-radius:50%; background:#fff; color:var(--ink);
    border:1mm solid var(--ink); display:flex; align-items:center; justify-content:center;
    font-family:var(--bhs); font-size:4.4mm}

  /* QR 섹션 */
  .qrsection{margin-top:9mm; background:var(--soft); border-radius:4mm; padding:8mm 6mm 7mm;
    text-align:center; position:relative}
  .qrcta{font-family:var(--bhs); font-size:6.6mm; color:var(--ink)}
  .qrcta b{color:var(--kor)}
  .qrwrap{display:flex; justify-content:center; margin-top:5mm; position:relative}
  .qr{width:60mm; height:60mm; background:#fff; border-radius:3mm; padding:3.5mm;
    display:flex; align-items:center; justify-content:center; box-shadow:0 4mm 10mm rgba(0,0,0,.14)}
  .qr img{width:100%; height:100%; object-fit:contain; display:block}
  .qr .ph{display:none; flex-direction:column; align-items:center; justify-content:center; gap:2mm;
    width:100%; height:100%; border:.6mm dashed #c7c2b2; border-radius:2mm; color:#aaa;
    font-family:var(--body); font-size:3.6mm; text-align:center; line-height:1.5}
  .qr.noqr img{display:none} .qr.noqr .ph{display:flex}
  .sticker{position:absolute; right:7mm; top:-4mm; transform:rotate(-9deg);
    background:var(--ink); color:#fff; font-family:var(--jua); font-size:4mm;
    padding:1.8mm 4mm; border-radius:99px; box-shadow:0 2mm 5mm rgba(0,0,0,.2)}
  .qrnote{font-family:var(--jua); font-size:4.4mm; color:#5a5e66; margin-top:4mm}

  /* 단계 */
  .steps{display:flex; gap:3mm; margin-top:9mm}
  .step{flex:1; background:#fff; border:.6mm solid #ECEAE3; border-radius:3mm; padding:4.5mm 2mm;
    text-align:center; box-shadow:0 2mm 6mm rgba(0,0,0,.05)}
  .step .n{font-family:var(--bhs); font-size:8mm; line-height:1; color:var(--kor)}
  .step:nth-child(2) .n{color:var(--muted)} .step:nth-child(3) .n{color:var(--mex)}
  .step .t{font-family:var(--jua); font-size:4mm; margin-top:1.5mm}

  .urlline{text-align:center; margin-top:6mm; font-size:4mm; color:#454952}
  .urlline b{color:var(--ink)}

  .footer{margin-top:auto; padding-top:5mm; border-top:.5mm solid #E7E5DE;
    display:flex; justify-content:space-between; font-size:3.6mm; color:var(--muted)}
  .footer b{color:var(--ink)}

  @media print{
    @page{ size:A4 portrait; margin:0 }
    body{background:#fff; padding:0}
    .toolbar{display:none}
    .poster{box-shadow:none}
    *{ -webkit-print-color-adjust:exact; print-color-adjust:exact }
  }
</style>
</head>
<body>

  <div class="toolbar">
    <button class="print-btn" onclick="window.print()">인쇄 / PDF로 저장</button>
    <div class="hint">버튼 → "PDF로 저장" 또는 프린터 선택 → A4 출력 (색 안 빠지게 '배경 그래픽' 켜기)</div>
  </div>

  <div class="poster">
